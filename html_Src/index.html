    <!-- 登录/注册弹窗 -->
    <div class="overlay" id="authOverlay">
        <div class="modal">
            <button class="close-btn" id="closeAuthBtn">✕</button>
            <h2 id="authTitle">登 录</h2>
            <input type="text" id="authUser" placeholder="用户名">
            <input type="password" id="authPass" placeholder="密码">
            <input type="password" id="authPass2" placeholder="确认密码" style="display:none">
            <button class="submit-btn" id="authSubmit">登 录</button>
            <div class="toggle-auth" id="toggleAuth">还没有账号？<span>立即注册</span></div>
        </div>
    </div>
